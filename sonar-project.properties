# SonarQube Cloud (formerly SonarCloud) configuration.
#
# Activation checklist (do these once the repo is on GitHub):
#   1. At https://sonarcloud.io, import this GitHub repository.
#   2. Copy the Organization Key and Project Key it assigns into the two
#      settings below (replace the placeholders).
#   3. In GitHub: Settings > Secrets and variables > Actions, add a repository
#      secret named SONAR_TOKEN (generate the token in SonarCloud).
#   4. In the SonarCloud project's Administration > Analysis Method, turn OFF
#      "Automatic Analysis" so the CI scan below (which carries coverage) is used.
#   5. Optionally raise the Quality Gate's coverage condition to 90% to match
#      pyproject's fail_under.

sonar.organization=REPLACE_WITH_SONARCLOUD_ORG
sonar.projectKey=REPLACE_WITH_SONARCLOUD_ORG_xtce-sim
sonar.projectName=xtce-sim

# Analysis scope
sonar.sources=xtce_sim
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python / coverage
sonar.python.version=3.11, 3.12, 3.13
sonar.python.coverage.reportPaths=coverage.xml
