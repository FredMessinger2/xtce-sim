# SonarQube Cloud (formerly SonarCloud) configuration.
#
# Runtime requirements for the CI scan (.github/workflows/ci.yml) to run:
#   - A SONAR_TOKEN repo secret (GitHub > Settings > Secrets and variables > Actions).
#   - "Automatic Analysis" turned OFF in the SonarCloud project (Administration >
#     Analysis Method) so this CI scan (which carries coverage) is the one used.
#   - Optionally set the Quality Gate's coverage condition to 90% (matches
#     pyproject's fail_under).

sonar.organization=fredmessinger2
sonar.projectKey=FredMessinger2_xtce-sim
sonar.projectName=xtce-sim

# Analysis scope
sonar.sources=xtce_sim
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python / coverage
sonar.python.version=3.11, 3.12, 3.13
sonar.python.coverage.reportPaths=coverage.xml

# Issue exclusions.
#
# S5332 ("use HTTPS") fires on the XTCE_NAMESPACES constants in the parser's
# reader module. Those http:// strings are XML namespace *identifiers* mandated
# verbatim by the OMG XTCE specification — they must match the xmlns attribute
# in real XTCE files byte-for-byte, and nothing is ever fetched from them.
# Rewriting them as https:// would break namespace detection.
sonar.issue.ignore.multicriteria=xtceNs
sonar.issue.ignore.multicriteria.xtceNs.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.xtceNs.resourceKey=xtce_sim/parser/reader.py
