<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xtce-sim console</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --ok: #3fb950; --bad: #f85149; --breathe: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
    font-size: 13px; padding: 12px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: baseline; gap: 16px;
    padding: 4px 4px 12px; flex-wrap: wrap; flex: none;
  }
  header h1 { font-size: 16px; color: var(--accent); font-weight: 600; }
  #link { display: inline-flex; align-items: center; gap: 6px; color: var(--dim); }
  #link .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--bad); display: inline-block;
  }
  #link.up .dot { background: var(--ok); }
  header button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 12px; font: inherit; cursor: pointer;
  }
  header button:hover { border-color: var(--accent); }
  #toggle { margin-left: auto; }

  /* Split layout: command log | splitter bar | telemetry grid.
     .h stacks them (commands on top); .v puts them side by side. */
  #split { flex: 1; display: flex; min-height: 0; }
  #split.h { flex-direction: column; }
  #split.v { flex-direction: row; }
  #cmdpane { display: flex; overflow: hidden; min-height: 0; min-width: 0; flex: none; }
  #cmdscroll { overflow: auto; min-height: 0; min-width: 0; flex: 1; }
  #tlmpane { overflow: auto; min-height: 0; min-width: 0; flex: 1; }

  /* The command entry rides the command pane and fits its shape:
     .v (pane is a tall left column)  -> entry UNDER the log, full width;
     .h (pane is a wide top strip)    -> entry LEFT of the log, a column. */
  #split.v #cmdpane { flex-direction: column; }
  #split.v #entry { border-top: 1px solid var(--border); padding-top: 6px; }
  #split.h #cmdpane { flex-direction: row; }
  #split.h #entry {
    order: -1; flex: 0 0 320px; min-width: 0;
    border-right: 1px solid var(--border); padding-right: 8px; margin-right: 8px;
  }
  #entry { flex: none; display: flex; flex-direction: column; gap: 4px; padding: 4px; }
  #cmdline {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font: inherit; width: 100%;
  }
  #cmdline:focus { outline: none; border-color: var(--accent); }
  #cmdline:disabled { opacity: 0.5; }
  #entry.confirm #cmdline { border-color: var(--bad); }
  #sugg { display: none; }
  #sugg.open {
    display: block; background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  #sugg div { padding: 3px 10px; cursor: pointer; white-space: nowrap; }
  #sugg div .d { color: var(--dim); margin-left: 10px; font-size: 11px; }
  #sugg div.sel, #sugg div:hover { background: #ffffff12; }
  #hint { color: var(--dim); min-height: 1.3em; padding: 0 4px; white-space: normal; }
  #hint.err { color: var(--bad); }
  #hint.confirm { color: var(--bad); font-weight: 600; }
  #hint.confirm.vital { color: var(--breathe); }
  #bar { flex: none; background: var(--border); border-radius: 3px; touch-action: none; }
  #bar:hover, #bar.dragging { background: var(--accent); }
  #split.h > #bar { height: 6px; margin: 4px 0; cursor: row-resize; }
  #split.v > #bar { width: 6px; margin: 0 4px; cursor: col-resize; }

  /* Command log */
  #cmdlog { padding: 2px 4px; }
  .cmd { display: flex; gap: 12px; padding: 2px 8px; white-space: nowrap; }
  .cmd:nth-child(odd) { background: #ffffff06; }
  .cmd .t { color: var(--dim); flex: none; }
  .cmd .n { color: var(--accent); flex: none; min-width: 20ch; }
  .cmd .a { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .cmd .s { flex: none; color: var(--ok); }
  .cmd.bad .s { color: var(--bad); }
  .cmd.sep { color: var(--dim); justify-content: center; background: none; }
  .cmd .sig {
    flex: none; font-size: 10px; font-weight: 600;
    padding: 0 6px; border-radius: 4px; align-self: center;
    border: 1px solid var(--bad); color: var(--bad);
  }
  .cmd .sig.vital { border-color: var(--breathe); color: var(--breathe); }

  #grid {
    display: grid; gap: 12px; padding: 2px;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .panel.stale { opacity: 0.55; }
  .panel h2 .event {
    flex: none; font-size: 10px; font-weight: 600;
    padding: 0 6px; border-radius: 4px; align-self: center;
    border: 1px solid var(--dim); color: var(--dim);
  }
  .panel h2 {
    font-size: 13px; font-weight: 600; color: var(--accent);
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: baseline;
  }
  .panel h2 .meta { margin-left: auto; color: var(--dim); font-weight: 400; font-size: 11px; }
  .panel table { width: 100%; border-collapse: collapse; }
  .panel td { padding: 3px 12px; vertical-align: baseline; }
  .panel tr:nth-child(odd) { background: #ffffff06; }
  td.f { color: var(--dim); width: 55%; }
  td.v { text-align: right; white-space: nowrap; }
  td.u { color: var(--dim); width: 3.5em; font-size: 11px; }
  .empty { color: var(--dim); padding: 16px 8px; }
</style>
</head>
<body>
<header>
  <h1 id="system">xtce-sim</h1>
  <span id="link"><span class="dot"></span><span id="linktext">connecting…</span></span>
  <button id="toggle" title="Toggle engineering units / raw wire counts">EU</button>
  <button id="orient" title="Flip the split between horizontal and vertical">split ⇵</button>
</header>
<div id="split" class="h">
  <div id="cmdpane">
    <div id="cmdscroll"><div id="cmdlog"><div class="empty" id="cmdempty">No commands yet — sends appear here as the vehicle echoes them.</div></div></div>
    <div id="entry">
      <div id="sugg"></div>
      <input id="cmdline" aria-label="Command entry" placeholder="COMMAND NAME=VALUE …" autocomplete="off" spellcheck="false" disabled>
      <div id="hint">waiting for the definition…</div>
    </div>
  </div>
  <div id="bar"></div>
  <div id="tlmpane"><div id="grid"><div class="empty">Waiting for the definition…</div></div></div>
</div>

<script>
"use strict";

let showRaw = false;
let definition = null;
const latest = new Map();   // apid -> last telemetry message
const panels = new Map();   // apid -> {panel, seq, time, cells: Map(field -> {v, u})}
const sigByName = new Map(); // command name -> {level, reason} for hazardous ones
const CMDLOG_MAX = 500;     // oldest lines drop off past this

const grid = document.getElementById("grid");
const cmdlog = document.getElementById("cmdlog");
const cmdpane = document.getElementById("cmdpane");
const cmdscroll = document.getElementById("cmdscroll");

document.getElementById("toggle").addEventListener("click", () => {
  showRaw = !showRaw;
  document.getElementById("toggle").textContent = showRaw ? "RAW" : "EU";
  for (const msg of latest.values()) render(msg, false);
});

// ---- split layout ----------------------------------------------------------

// localStorage can THROW on mere access (blocked cookies, sandboxed iframe,
// private-mode quota). Layout preferences must never kill the console, so
// all storage goes through this shrug-and-continue wrapper.
const store = {
  get(k) { try { return localStorage.getItem(k); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch { /* preference lost, page lives */ } },
};

const split = document.getElementById("split");
const bar = document.getElementById("bar");
let orient = store.get("splitOrient") || "h";

function splitPos() {
  // Never trust storage: clamp to the same 10..90 the drag enforces.
  const pos = Number.parseFloat(store.get("splitPos-" + orient)) || 30;
  return Math.min(90, Math.max(10, pos));
}

function applySplit() {
  split.className = orient;
  document.getElementById("orient").textContent = orient === "h" ? "split ⇵" : "split ⇄";
  cmdpane.style.flexBasis = splitPos() + "%";
}

document.getElementById("orient").addEventListener("click", () => {
  orient = orient === "h" ? "v" : "h";
  applySplit();
  store.set("splitOrient", orient);
});

bar.addEventListener("pointerdown", (down) => {
  down.preventDefault();
  bar.setPointerCapture(down.pointerId);
  bar.classList.add("dragging");
  const rect = () => split.getBoundingClientRect();
  const onMove = (ev) => {
    const r = rect();
    const frac = orient === "h"
      ? (ev.clientY - r.top) / r.height
      : (ev.clientX - r.left) / r.width;
    const pos = Math.min(90, Math.max(10, frac * 100));
    cmdpane.style.flexBasis = pos + "%";
    store.set("splitPos-" + orient, String(pos));
  };
  // pointercancel too: a drag the browser interrupts (touch gesture,
  // focus loss) fires cancel, not up — without this the listeners leak
  // and the bar keeps resizing on hover with no button down.
  const onUp = () => {
    bar.classList.remove("dragging");
    bar.removeEventListener("pointermove", onMove);
    bar.removeEventListener("pointerup", onUp);
    bar.removeEventListener("pointercancel", onUp);
  };
  bar.addEventListener("pointermove", onMove);
  bar.addEventListener("pointerup", onUp);
  bar.addEventListener("pointercancel", onUp);
});

applySplit();

// ---- command log -----------------------------------------------------------

function logCommand(msg) {
  const empty = document.getElementById("cmdempty");
  if (empty) empty.remove();

  // Stick to the bottom only if the user is already there; someone reading
  // history up the scrollback must not be yanked down by new traffic.
  const pinned =
    cmdscroll.scrollTop + cmdscroll.clientHeight >= cmdscroll.scrollHeight - 8;

  const line = document.createElement("div");
  line.className = msg.status === "executed" ? "cmd" : "cmd bad";
  const t = document.createElement("span"); t.className = "t";
  t.textContent = msg.time.slice(11);
  const n = document.createElement("span"); n.className = "n";
  n.textContent = msg.name;
  const parts = [t, n];
  const sig = sigByName.get(msg.name);
  if (sig) {
    // The XTCE-declared criticality, worn as a badge: red for critical/
    // forbidden, amber for vital/user1; the declared reason is the tooltip.
    const badge = document.createElement("span");
    badge.className = (sig.level === "critical" || sig.level === "forbidden")
      ? "sig" : "sig vital";
    badge.textContent = sig.level.toUpperCase();
    if (sig.reason) badge.title = sig.reason;
    parts.push(badge);
  }
  const a = document.createElement("span"); a.className = "a";
  let argText = "";
  if (msg.args) {
    argText = Object.entries(msg.args).map(([k, v]) => k + "=" + v).join("  ");
  } else if (msg.raw) {
    argText = "raw=" + msg.raw;
  }
  a.textContent = argText;
  const s = document.createElement("span"); s.className = "s";
  s.textContent = msg.status === "executed" ? "✓" : "✗ " + msg.status;
  parts.push(a, s);
  line.append(...parts);
  cmdlog.appendChild(line);

  // Trim in PAIRS: nth-child(odd) striping means removing one row flips
  // every survivor's parity and the whole log's zebra strobes under
  // continuous traffic once the cap is reached.
  while (cmdlog.childElementCount > CMDLOG_MAX) {
    cmdlog.firstElementChild.remove();
    if (cmdlog.firstElementChild) cmdlog.firstElementChild.remove();
  }
  if (pinned) cmdscroll.scrollTop = cmdscroll.scrollHeight;
}

function logSeparator(text) {
  // A boundary marker in the command history — a reconnect may be a new
  // sim (even a different satellite), and silently continuing the old
  // vehicle's history under a new title would mislead.
  const empty = document.getElementById("cmdempty");
  if (empty) return;  // nothing logged yet; no boundary to mark
  const line = document.createElement("div");
  line.className = "cmd sep";
  line.textContent = text;
  cmdlog.appendChild(line);
  cmdscroll.scrollTop = cmdscroll.scrollHeight;
}

// ---- command entry ----------------------------------------------------------
//
// One line, shell-style: COMMAND NAME=VALUE NAME=VALUE. The name
// autocompletes from the definition; a command the ICD marks hazardous
// takes a confirm step (the declared reason shown) before transmitting.
// The bridge is the ground authority — it re-validates everything — but
// the page pre-checks the name so typos never leave the keyboard.

const cmdline = document.getElementById("cmdline");
const sugg = document.getElementById("sugg");
const hint = document.getElementById("hint");
const entry = document.getElementById("entry");
const commandsByName = new Map();  // canonical name -> command definition
let ws = null;                     // the live bridge socket (set in connect)
let sendSeq = 0;                   // send_result correlation ids
let suggMatches = [];              // suggestion names currently offered
let suggSel = -1;                  // highlighted suggestion index
let pendingConfirm = null;         // {name, args, text} awaiting the second Enter
const sentHistory = [];            // sent lines, newest last
let histPos = -1;                  // -1 = not browsing

function setHint(text, cls) {
  hint.textContent = text;
  hint.className = cls || "";
}

function paramSignature(cmd) {
  if (!cmd.params.length) return cmd.name + " takes no arguments";
  return cmd.params.map((p) => {
    if (p.enumerations) return p.name + "=" + Object.keys(p.enumerations).join("|");
    let range = "";
    if (p.min != null || p.max != null) {
      range = " (" + (p.min ?? "…") + ".." + (p.max ?? "…") + ")";
    }
    return p.name + "=<" + p.type + ">" + range + (p.unit ? " " + p.unit : "");
  }).join("  ");
}

function parseLine(text) {
  const tokens = text.trim().split(/\s+/).filter(Boolean);
  if (!tokens.length) return null;
  const name = tokens[0].toUpperCase();
  const args = {};
  const bad = [];
  for (const tok of tokens.slice(1)) {
    const eq = tok.indexOf("=");
    if (eq <= 0) { bad.push(tok); continue; }
    args[tok.slice(0, eq)] = tok.slice(eq + 1);
  }
  return { name, args, bad };
}

function currentMatches(prefix) {
  const up = prefix.toUpperCase();
  const starts = [];
  const contains = [];
  for (const name of commandsByName.keys()) {
    if (name.startsWith(up)) starts.push(name);
    else if (name.includes(up)) contains.push(name);
  }
  return starts.concat(contains).slice(0, 8);
}

function closeSugg() {
  suggMatches = [];
  suggSel = -1;
  sugg.className = "";
  sugg.textContent = "";
}

function renderSugg() {
  sugg.textContent = "";
  for (const [i, name] of suggMatches.entries()) {
    const row = document.createElement("div");
    if (i === suggSel) row.className = "sel";
    row.textContent = name;
    const cmd = commandsByName.get(name);
    if (cmd.description) {
      const d = document.createElement("span");
      d.className = "d";
      d.textContent = cmd.description;
      row.appendChild(d);
    }
    row.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();  // keep focus in the input
      completeTo(name);
    });
    sugg.appendChild(row);
  }
  sugg.className = suggMatches.length ? "open" : "";
}

function completeTo(name) {
  cmdline.value = name + " ";
  closeSugg();
  refreshHint();
  cmdline.focus();
}

function refreshHint() {
  const parsed = parseLine(cmdline.value);
  if (!parsed) { setHint("type a command — Tab completes, Enter sends"); return; }
  const cmd = commandsByName.get(parsed.name);
  if (cmd) {
    setHint(paramSignature(cmd));
  } else {
    setHint("");
  }
}

function cancelConfirm() {
  pendingConfirm = null;
  entry.className = "";
  refreshHint();
}

function transmit(name, args, text) {
  sendSeq += 1;
  ws.send(JSON.stringify({ type: "send", id: sendSeq, name, args }));
  sentHistory.push(text);
  histPos = -1;
  cmdline.value = "";
  refreshHint();
}

function trySend() {
  const text = cmdline.value;
  const parsed = parseLine(text);
  if (!parsed) return;
  const cmd = commandsByName.get(parsed.name);
  if (!cmd) {
    setHint("unknown command " + parsed.name + " — Tab completes a name", "err");
    return;
  }
  if (parsed.bad.length) {
    setHint("arguments are NAME=VALUE pairs — cannot read: " + parsed.bad.join(" "), "err");
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    setHint("bridge connection is down — nothing was transmitted", "err");
    return;
  }
  const sig = sigByName.get(cmd.name);
  if (sig && !pendingConfirm) {
    // The ICD says this one is hazardous: show the level and its declared
    // reason, and require one more Enter. Esc backs out.
    pendingConfirm = { name: cmd.name, args: parsed.args, text };
    entry.className = "confirm";
    const vital = !(sig.level === "critical" || sig.level === "forbidden");
    setHint(
      sig.level.toUpperCase() + (sig.reason ? ": " + sig.reason : "") +
      " — Enter to transmit, Esc to cancel",
      "confirm" + (vital ? " vital" : "")
    );
    return;
  }
  const send = pendingConfirm || { name: cmd.name, args: parsed.args, text };
  cancelConfirm();
  transmit(send.name, send.args, send.text);
}

function onSendResult(msg) {
  if (msg.ok) return;  // the command echo tells the success story
  setHint(msg.error, "err");
  // The refusal also goes on the record: a ground refusal is part of the
  // session's command history, styled like any failed command. The time
  // matches the bridge's local-time format (logCommand slices [11:]).
  const d = new Date();
  const p = (n, w) => String(n).padStart(w || 2, "0");
  logCommand({
    time: "0000-00-00T" + p(d.getHours()) + ":" + p(d.getMinutes()) + ":" +
      p(d.getSeconds()) + "." + p(d.getMilliseconds(), 3),
    name: msg.name || "(unknown)",
    status: "refused by ground",
    args: null,
    raw: null,
  });
}

function moveSuggSelection(step) {
  const n = suggMatches.length;
  suggSel = (suggSel + step + n) % n;
  renderSugg();
}

function recallHistory(step) {
  // Shell-style: ArrowUp walks back through sent lines, ArrowDown forward
  // and finally back to an empty line. Returns whether the key was used.
  if (!sentHistory.length) return false;
  if (step < 0) {
    histPos = histPos === -1 ? sentHistory.length - 1 : Math.max(0, histPos - 1);
  } else {
    if (histPos === -1) return false;
    histPos = histPos + 1 >= sentHistory.length ? -1 : histPos + 1;
  }
  cmdline.value = histPos === -1 ? "" : sentHistory[histPos];
  refreshHint();
  return true;
}

function entryKey(ev) {
  // Returns whether the key was consumed (caller preventDefaults).
  const open = suggMatches.length > 0;
  switch (ev.key) {
    case "Escape":
      if (pendingConfirm) { cancelConfirm(); return true; }
      if (open) { closeSugg(); return true; }
      return false;
    case "ArrowDown":
      if (open) { moveSuggSelection(1); return true; }
      return recallHistory(1);
    case "ArrowUp":
      if (open) { moveSuggSelection(-1); return true; }
      return recallHistory(-1);
    case "Tab":
      if (open) { completeTo(suggMatches[Math.max(suggSel, 0)]); return true; }
      return false;
    case "Enter":
      if (open && suggSel >= 0) { completeTo(suggMatches[suggSel]); return true; }
      trySend();
      return true;
    default:
      return false;
  }
}

cmdline.addEventListener("input", () => {
  if (pendingConfirm) cancelConfirm();  // editing invalidates the armed send
  const text = cmdline.value;
  if (!text.includes(" ") && text.trim()) {
    suggSel = -1;
    suggMatches = currentMatches(text.trim());
    renderSugg();
  } else {
    closeSugg();
  }
  refreshHint();
});

cmdline.addEventListener("keydown", (ev) => {
  if (entryKey(ev)) ev.preventDefault();
});

// ---- telemetry panels ------------------------------------------------------

function breathe(el) {
  // A changed value breathes: the text swells to the --breathe color
  // (set in :root, next to the rest of the palette) with a soft glow and
  // eases back — no background blocks. A fresh change while one is
  // mid-breath cancels it and starts over.
  for (const a of el.getAnimations()) a.cancel();
  const glow = getComputedStyle(document.documentElement)
    .getPropertyValue("--breathe").trim();
  el.animate(
    [
      { color: "", textShadow: "none" },
      { color: glow, textShadow: "0 0 10px " + glow, offset: 0.3 },
      { color: "", textShadow: "none" },
    ],
    { duration: 1400, easing: "ease-in-out" }
  );
}

function fmt(num) {
  if (typeof num !== "number") return String(num);
  if (Number.isInteger(num)) return String(num);
  const a = Math.abs(num);
  if (a !== 0 && (a >= 1e6 || a < 1e-3)) return num.toExponential(3);
  return String(Number.parseFloat(num.toFixed(3)));  // fixed precision, trailing zeros dropped
}

function displayValue(fdef, fv) {
  // Same rules as the terminal monitor (_display_value): the enum label
  // wins in BOTH views, then the calibrated engineering value; the raw
  // view shows wire counts with the unit suppressed (counts are unitless).
  if (fv.label != null) return { text: fv.label, unit: fdef.unit };
  const val = showRaw ? fv.raw : fv.eu;
  const unit = (showRaw && fdef.calibrated) ? null : fdef.unit;
  return { text: val == null ? "—" : fmt(val), unit };
}

function buildPanels(def) {
  // A rebuild means a (re)connect: drop everything from the old world, or
  // the EU/RAW toggle would repaint pre-restart telemetry as current and
  // panels for vanished APIDs would leak.
  panels.clear();
  latest.clear();
  sigByName.clear();
  commandsByName.clear();
  for (const c of def.commands || []) {
    commandsByName.set(c.name, c);
    if (c.significance && c.significance !== "normal") {
      sigByName.set(c.name, { level: c.significance, reason: c.significance_reason });
    }
  }
  cmdline.disabled = false;
  cancelConfirm();
  const eventOnly = new Set(def.event_only || []);
  grid.textContent = "";
  document.getElementById("system").textContent = def.system + " · xtce-sim console";
  document.title = def.system + " · xtce-sim console";
  for (const p of def.packets) {
    const isEvent = eventOnly.has(p.apid);
    const panel = document.createElement("div");
    // Event-driven packets are QUIET by design: they are born undimmed
    // and never go stale — the latched last event stays readable.
    panel.className = isEvent ? "panel" : "panel stale";
    const h2 = document.createElement("h2");
    const nameEl = document.createElement("span");
    nameEl.textContent = p.name;
    if (isEvent) {
      const badge = document.createElement("span");
      badge.className = "event";
      badge.textContent = "EVENT";
      badge.title = "Downlinks when something happens, never on the beacon — quiet is normal.";
      h2.appendChild(badge);
    }
    const meta = document.createElement("span");
    meta.className = "meta";
    meta.textContent = "APID 0x" + p.apid.toString(16).toUpperCase() +
      (isEvent ? " · no events yet" : " · no data");
    h2.append(nameEl, meta);
    const table = document.createElement("table");
    const cells = new Map();
    for (const f of p.fields) {
      const tr = document.createElement("tr");
      const tf = document.createElement("td"); tf.className = "f"; tf.textContent = f.name;
      const tv = document.createElement("td"); tv.className = "v"; tv.textContent = "—";
      const tu = document.createElement("td"); tu.className = "u";
      tr.append(tf, tv, tu);
      table.appendChild(tr);
      cells.set(f.name, { v: tv, u: tu, def: f });
    }
    panel.append(h2, table);
    grid.appendChild(panel);
    panels.set(p.apid, { panel, meta, cells, lastSeen: 0, isEvent });
  }
}

function render(msg, isArrival) {
  const entry = panels.get(msg.apid);
  if (!entry) return;
  entry.meta.textContent =
    "APID 0x" + msg.apid.toString(16).toUpperCase() +
    " · seq " + msg.seq + " · " + msg.time.slice(11);
  if (isArrival) {
    entry.lastSeen = Date.now();
    entry.panel.classList.remove("stale");
  }
  if (!msg.fields) return;
  for (const [name, fv] of Object.entries(msg.fields)) {
    const cell = entry.cells.get(name);
    if (!cell) continue;
    const { text, unit } = displayValue(cell.def, fv);
    if (isArrival && cell.v.textContent !== text && cell.v.textContent !== "—") {
      breathe(cell.v);
    }
    cell.v.textContent = text;
    cell.u.textContent = unit || "";
  }
}

// Dim panels whose packets stopped arriving (>5 s without an update).
// Event-driven packets are exempt: they downlink when something happens,
// so quiet is their normal state, not staleness.
setInterval(() => {
  const now = Date.now();
  for (const p of panels.values()) {
    if (!p.isEvent && p.lastSeen && now - p.lastSeen > 5000) {
      p.panel.classList.add("stale");
    }
  }
}, 1000);

// ---- connection ------------------------------------------------------------

function setLink(up, text) {
  const el = document.getElementById("link");
  el.classList.toggle("up", up);
  document.getElementById("linktext").textContent = text;
}

function connect() {
  ws = new WebSocket(
    (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws"
  );
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "definition") {
      if (definition) logSeparator("— reconnected: " + msg.system + " —");
      definition = msg;
      buildPanels(msg);
    } else if (msg.type === "telemetry") {
      latest.set(msg.apid, msg);
      render(msg, true);
    } else if (msg.type === "command") {
      logCommand(msg);
    } else if (msg.type === "send_result") {
      onSendResult(msg);
    } else if (msg.type === "link") {
      setLink(msg.up, msg.up ? "sim link up" : "sim link down");
    }
  };
  ws.onclose = () => {
    setLink(false, "bridge lost — retrying");
    setTimeout(connect, 2000);   // the bridge itself went away; keep trying
  };
}
connect();
</script>
