# ADCS behavior for the ImagingSat example — minimal boot state only.
# Values are ENGINEERING UNITS; calibrated fields transmit raw counts.
# Dynamics (slews, wheel response, sensor motion) are future work; these
# seeds exist because an all-zeros ADCS packet is not merely dull but
# INVALID — a zero-length quaternion is not an attitude.

[_initial]
ADCS_MODE = "STANDBY"
ADCS_EST_STATE = "VALID"
# Identity quaternion: pointing exactly at the reference attitude.
ADCS_ATT_QUAT_Q1 = 0.0
ADCS_ATT_QUAT_Q2 = 0.0
ADCS_ATT_QUAT_Q3 = 0.0
ADCS_ATT_QUAT_Q4 = 1.0
ADCS_ST_QUAT_Q1 = 0.0
ADCS_ST_QUAT_Q2 = 0.0
ADCS_ST_QUAT_Q3 = 0.0
ADCS_ST_QUAT_Q4 = 1.0
ADCS_ST_VALID = "OK"
ADCS_SUN_PRESENT = "PRESENT"
ADCS_MTQ_STATE = "ON"
ADCS_SUN_Z = 1.0
# Typical low-Earth-orbit field magnitude, mostly along one axis here.
ADCS_MAG_X = 22.0
ADCS_MAG_Y = -8.0
ADCS_MAG_Z = 35.0
ADCS_WHEEL1_TEMP = 20.0
ADCS_WHEEL2_TEMP = 20.0
ADCS_WHEEL3_TEMP = 20.0
ADCS_WHEEL4_TEMP = 20.0

# Mode changes acknowledge instantly, like the other subsystems.
[ADCS_SET_MODE]
ADCS_MODE = { set = "@arg:Mode", emit = "immediate" }

# ---------------------------------------------------------------------------
# Setpoint reflections: telemetry mirrors the commanded value the moment the
# command executes. HONEST LIMIT — these are placeholders, not dynamics: a
# slew JUMPS the quaternion (no rotation, no settling), a wheel speed STEPS
# (no spin-up, no current draw), and derived quantities (Euler angles vs
# quaternion, rates, momentum) are NOT kept consistent with each other.
# Real ADCS dynamics replace these when the behaviors arc lands. Commands
# with no direct telemetry mirror (WHEEL_ENABLE/DISABLE, DESATURATE,
# RESET_ESTIMATOR, SET_GYRO_BIAS) stay unwired until then.

[ADCS_SLEW_TO_QUATERNION]
ADCS_ATT_QUAT_Q1 = { set = "@arg:Q1", emit = "immediate" }
ADCS_ATT_QUAT_Q2 = { set = "@arg:Q2", emit = "immediate" }
ADCS_ATT_QUAT_Q3 = { set = "@arg:Q3", emit = "immediate" }
ADCS_ATT_QUAT_Q4 = { set = "@arg:Q4", emit = "immediate" }

[ADCS_SLEW_TO_ANGLES]
ADCS_ATT_ROLL = { set = "@arg:Roll", emit = "immediate" }
ADCS_ATT_PITCH = { set = "@arg:Pitch", emit = "immediate" }
ADCS_ATT_YAW = { set = "@arg:Yaw", emit = "immediate" }

[ADCS_WHEEL_SET_SPEED]
"ADCS_WHEEL{WheelId}_SPEED" = { set = "@arg:Speed", emit = "immediate" }

[ADCS_MTQ_ENABLE]
ADCS_MTQ_STATE = { set = "@arg:State", emit = "immediate" }

# Commanding a ground target puts the vehicle in target-track mode.
[ADCS_TRACK_TARGET]
ADCS_MODE = { set = "TARGET_TRACK", emit = "immediate" }
