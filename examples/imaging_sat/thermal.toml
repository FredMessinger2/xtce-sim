# Thermal subsystem behavior for the ImagingSat example.
# Values are ENGINEERING UNITS (degrees, volts); calibrated fields are
# converted to raw wire counts by the engine. Full schema: README, section
# 'Behavior: making commands change telemetry'.

[_initial]
THM_HEATER1_TEMP = 20.0
THM_HEATER2_TEMP = 20.0
THM_HEATER1_SETPOINT = 40.0
THM_HEATER2_SETPOINT = 40.0

# Three heater modes, matching HeaterStateType's OFF/ON/AUTO:
#   HEATER_AUTO — the thermostat. regulate runs a bang-bang loop around the
#     live setpoint: element on below the band, off above it, so the
#     temperature sawtooths inside band and follows setpoint changes forever.
#   HEATER_ON — manual override: the element is forced on, open loop. The
#     temperature heads for the element's capability (60), NOT the setpoint.
#   HEATER_OFF — element off; passive cooling back to ambient, slower than
#     powered heating.
[HEATER_AUTO]
"THM_HEATER{HeaterId}_STATE" = { set = "AUTO", emit = "immediate" }
"THM_HEATER{HeaterId}_TEMP" = { regulate = "@THM_HEATER{HeaterId}_SETPOINT", band = 2.0, heats_to = 60.0, tau_heat = 30.0, cools_to = 20.0, tau_cool = 45.0 }
# The power card's heater channel: one PWR_HEATER_STATE for two heaters, so
# it tracks the LAST heater command. Honest limit: switching one of two lit
# heaters off reads the whole channel OFF — per-heater channels would need
# an ICD change (see backlog).
PWR_HEATER_STATE = { set = "ON", emit = "immediate" }

[HEATER_ON]
"THM_HEATER{HeaterId}_STATE" = { set = "ON", emit = "immediate" }
"THM_HEATER{HeaterId}_TEMP" = { ramp_to = 60.0, tau = 30.0 }
PWR_HEATER_STATE = { set = "ON", emit = "immediate" }

[HEATER_OFF]
"THM_HEATER{HeaterId}_STATE" = { set = "OFF", emit = "immediate" }
"THM_HEATER{HeaterId}_TEMP" = { ramp_to = 20.0, tau = 45.0 }
PWR_HEATER_STATE = { set = "OFF", emit = "immediate" }

[SET_HEATER_SETPOINT]
"THM_HEATER{HeaterId}_SETPOINT" = "@arg:Setpoint"

# Ambient orbit thermal environment: the structural panels ride the
# ~90-minute orbit cycle (phase-staggered: when +X faces the sun, -X faces
# deep space), and the radiator sits cold.
[_signals]
THM_PANEL_PLUS_X = { oscillate = 10.0, amplitude = 25.0, period = 5400, noise = 0.5 }
THM_PANEL_MINUS_X = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 2700, noise = 0.5 }
THM_PANEL_PLUS_Y = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 1350, noise = 0.5 }
THM_PANEL_MINUS_Y = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 4050, noise = 0.5 }
THM_RADIATOR = { hold = -5.0, noise = 0.4 }
