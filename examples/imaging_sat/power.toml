# Power subsystem behavior for the ImagingSat example.
# Values are ENGINEERING UNITS (degrees, volts); calibrated fields are
# converted to raw wire counts by the engine. Full schema: README, section
# 'Behavior: making commands change telemetry'.

# Power states at boot: the bus comes up with the platform loads on, the
# payload off, and the heater circuit off (matching THM_HEATER*_STATE's
# zero defaults). Held by the engine, so every PWR_*_STATE reads as a real
# state, not synthetic wobble, from the first beacon.
[_initial]
PWR_CDH_STATE = "ON"
PWR_COMMS_STATE = "ON"
PWR_IMAGER_STATE = "OFF"
PWR_ADCS_STATE = "ON"
PWR_HEATER_STATE = "OFF"

# SET_POWER names a switchable load (PowerLoadIdType in the XTCE); the enum
# label fills the template, so COMMS lands in PWR_COMMS_STATE. The heater's
# channel is not addressed here — HEATER_ON/HEATER_OFF own it (thermal.toml).
# POWER_STATUS emits the moment the command lands.
#
# Honest limit: this flips only the power switch. SET_POWER IMAGER OFF does
# not drive IMG_STATE or cancel the focal-plane ramp (IMAGER_ON/IMAGER_OFF
# do both) — effects cannot yet condition on an argument's value, so the
# imager's side of that switch is modeled only by its own commands (backlog).
[SET_POWER]
"PWR_{SubsystemId}_STATE" = { set = "@arg:PowerState", emit = "immediate" }

# Battery temperature stays a behavioral hold until thermal coupling
# becomes real; everything else electrical is the model's now.
[_signals]
PWR_BATTERY_TEMP = { hold = 15.0, noise = 0.4 }

# ---------------------------------------------------------------------------
# The EPS as physics: generation follows the shared [_environment] sun and
# eclipse plus the vehicle's real attitude (perfect single-axis SADA
# tracking — the only off-pointing that costs power is the sun component
# along the wing axis); the battery integrates charge and its voltage
# follows charge and sags under load; each load below draws its nominal
# current while its PWR_<name>_STATE reads ON (per-activity draws are the
# next bank). PWR_BATTERY_CURRENT is signed: positive charging, negative
# discharging. Numbers from docs/power-wiring-model.md.
[_models.power]
kind = "power"

[_models.power.array]
wing_power_w = 60.0          # Pmp per wing, BOL, sun-normal
wings = 2
vmp = 28.0                   # array max-power voltage
mppt_efficiency = 0.95
sada_axis = [0.0, 1.0, 0.0]  # wings rotate about body Y

[_models.power.battery]
capacity_ah = 10.0
cells = 6                    # Li-ion in series, 22.2 V nominal
internal_resistance = 0.15   # ohm, whole string
charge_current_max = 2.0     # A, tapers over the top 10% of charge
initial_soc = 0.75           # boots at 24.0 V open-circuit

[_models.power.loads]        # amps while PWR_<name>_STATE is ON
CDH = 0.3
ADCS = 0.5
COMMS = 0.1
IMAGER = 0.2
HEATER = 0.6

[_models.power.outputs]
PWR_SOLAR_VOLTAGE = "solar_voltage"
PWR_SOLAR_CURRENT = "solar_current"
PWR_BATTERY_VOLTAGE = "battery_voltage"
PWR_BATTERY_CURRENT = "battery_current"
