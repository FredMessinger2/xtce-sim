# System-level command behavior for the ImagingSat example.
# Values are ENGINEERING UNITS (degrees, volts); calibrated fields are
# converted to raw wire counts by the engine. Full schema: README, section
# 'Behavior: making commands change telemetry'.

# The shared world: one orbit, one sun, one eclipse, for every model on
# this vehicle. Declared here at the vehicle level — the ADCS reads it,
# and the future power model will read the same one. (The sun defaults
# to ECI +X; declare sun_direction to change it.)
[_environment.orbit]
altitude_km = 500.0
inclination_deg = 51.6

# Mode changes are acknowledged instantly: the ground should not wait a
# beacon interval to learn the vehicle obeyed.
[SET_MODE]
HK_SYSTEM_MODE = { set = "@arg:Mode", emit = "immediate" }

# ---------------------------------------------------------------------------
# The source XTCE's original DOWNLINK_START/STOP annotations targeted a
# COMM_DOWNLINK_ACTIVE field no packet defined; they came true when
# COMM_DOWNLINK_STATE was added to COMMS_STATUS — the live mirrors are in
# comms.toml, and the server owns the real session state (DOWNLINK_COMMANDS
# in server.py), the same split ENABLE_BEACON uses.
