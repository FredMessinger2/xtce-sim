# Behavior definition for the ImagingSat example — sidecar to imaging_sat.xml.
#
# The XTCE defines the command/telemetry INTERFACE; this file defines what
# the plant DOES: what each command changes, and how values evolve on their
# own. Schema:
#   FIELD = value                          set the field when the command executes
#   FIELD = "@arg:Name"                    copy the command argument's value
#   FIELD = { increment = N }              add N to the field's current value
#   FIELD = { ramp_to = X, tau = S }       first-order approach toward X with
#                                          time constant S seconds; X may be a
#                                          number or "@FIELD" (read live each tick)
#   FIELD = { oscillate = C, amplitude = A, period = P }
#                                          wave around center C (number or "@FIELD");
#                                          optional shape = "sine"|"triangle"|"sawtooth"
#                                          and phase = seconds into the cycle
#   FIELD = { hold = V }                   keep re-asserting V (number or "@FIELD")
#   noise = STDDEV                         optional on ramp_to/oscillate/hold:
#                                          Gaussian jitter, seeded per field
#   emit = "immediate"                     on set/increment (table form): push
#                                          the affected packet out right now,
#                                          instead of waiting for the beacon
#   An "@FIELD" reference must not name the field itself (unbounded drift).
#   {ArgName} inside a field name is filled from the command's arguments.
#   [_initial] seeds one-shot values at boot; [_signals] starts continuous
#   behaviors (ramp_to/oscillate/hold) at boot with no command needed.

[_initial]
# Ambient / power-on conditions at sim start.
THM_HEATER1_TEMP = 20.0
THM_HEATER2_TEMP = 20.0
THM_HEATER1_SETPOINT = 40.0
THM_HEATER2_SETPOINT = 40.0
IMG_FOCAL_PLANE_TEMP = 20.0

# Mode changes are acknowledged instantly: the ground should not wait a
# beacon interval to learn the vehicle obeyed.
[SET_MODE]
HK_SYSTEM_MODE = { set = "@arg:Mode", emit = "immediate" }

[HEATER_ON]
"THM_HEATER{HeaterId}_STATE" = { set = "ON", emit = "immediate" }
"THM_HEATER{HeaterId}_TEMP" = { ramp_to = "@THM_HEATER{HeaterId}_SETPOINT", tau = 30.0 }

[HEATER_OFF]
"THM_HEATER{HeaterId}_STATE" = { set = "OFF", emit = "immediate" }
# Passive cooling back to ambient is slower than powered heating.
"THM_HEATER{HeaterId}_TEMP" = { ramp_to = 20.0, tau = 45.0 }

[SET_HEATER_SETPOINT]
"THM_HEATER{HeaterId}_SETPOINT" = "@arg:Setpoint"

[IMAGER_ON]
IMG_STATE = { set = "IDLE", emit = "immediate" }
# The event channel: EVENT_LOG only means anything pushed at the moment
# something happens; a beacon copy of a stale event is noise.
EVT_MESSAGE = { set = "IMAGER POWERED ON", emit = "immediate" }
EVT_EVENT_ID = { set = 10, emit = "immediate" }
IMG_FOCAL_PLANE_TEMP = { ramp_to = 35.0, tau = 20.0, noise = 0.2 }

[IMAGER_OFF]
IMG_STATE = { set = "OFF", emit = "immediate" }
IMG_FOCAL_PLANE_TEMP = { ramp_to = 20.0, tau = 30.0, noise = 0.2 }

[SET_EXPOSURE]
IMG_EXPOSURE_MS = "@arg:ExposureMs"
IMG_GAIN = "@arg:GainLevel"

[TAKE_IMAGE]
IMG_STATE = { set = "CAPTURING", emit = "immediate" }
EVT_MESSAGE = { set = "IMAGE CAPTURE STARTED", emit = "immediate" }
EVT_EVENT_ID = { set = 11, emit = "immediate" }
# Faithful to the original annotation: the commanded count is COPIED into
# the field (not accumulated).
IMG_CAPTURE_COUNT = "@arg:ImageCount"
# Capturing works the focal plane harder than idling: heat toward a hotter
# operating point. Cools back to 35 only via IMAGER_ON (or 20 via IMAGER_OFF)
# — there is no timed "capture finished" trigger yet.
IMG_FOCAL_PLANE_TEMP = { ramp_to = 45.0, tau = 15.0, noise = 0.2 }

[SET_ATTITUDE]
HK_ATTITUDE_MODE = "@arg:AttitudeMode"

# ---------------------------------------------------------------------------
# Dangling in the source XTCE: the original annotations below targeted
# COMM_* telemetry fields that are not defined in any packet, so they could
# never have taken effect. Preserved as intent; enable them if a COMM
# status packet is ever added to imaging_sat.xml.
#
# [DOWNLINK_START]
# COMM_DOWNLINK_ACTIVE = 1
#
# [DOWNLINK_STOP]
# COMM_DOWNLINK_ACTIVE = 0
#
# [ENABLE_BEACON]
# COMM_BEACON_STATE = "@arg:BeaconState"

# ---------------------------------------------------------------------------
# Ambient signals — continuous behaviors running from boot, no command needed.
# The structural panels ride the ~90-minute orbit thermal cycle (phase-
# staggered: when +X faces the sun, -X faces deep space), the radiator sits
# cold, and the power bus breathes with seeded (reproducible) noise.
[_signals]
THM_PANEL_PLUS_X = { oscillate = 10.0, amplitude = 25.0, period = 5400, noise = 0.5 }
THM_PANEL_MINUS_X = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 2700, noise = 0.5 }
THM_PANEL_PLUS_Y = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 1350, noise = 0.5 }
THM_PANEL_MINUS_Y = { oscillate = 10.0, amplitude = 25.0, period = 5400, phase = 4050, noise = 0.5 }
THM_RADIATOR = { hold = -5.0, noise = 0.4 }
PWR_SOLAR_VOLTAGE = { oscillate = 16.0, amplitude = 12.0, period = 5400, noise = 0.3 }
PWR_BATTERY_VOLTAGE = { hold = 24.0, noise = 0.3 }
PWR_BATTERY_TEMP = { hold = 15.0, noise = 0.4 }
