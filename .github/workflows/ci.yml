name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv pip install --system -e '.[dev]'
      - name: Lint
        run: ruff check xtce_sim tests
      - name: "Test (enforces coverage gate: fail_under=90)"
        run: pytest --cov=xtce_sim --cov-report=term-missing

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Sonar can attribute new code and blame
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv pip install --system -e '.[dev]'
      - name: Coverage report for Sonar
        run: pytest --cov=xtce_sim --cov-report=xml
      - name: Scan
        # Skips automatically on fork PRs, where the secret is unavailable.
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
